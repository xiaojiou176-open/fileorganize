version: 1
business_env_prefixes:
  - MOVI_
  - GEMINI_
  - LIVE_
  - CLEAN_CACHE_
  - PRE_COMMIT_
  - PYTEST_
  - HEARTBEAT_
  - QUALITY_GATE_
ignored_suffixes:
  - _SOURCE
category_budgets:
  MOVI_: 42
  GEMINI_: 5
  LIVE_: 5
  CLEAN_CACHE_: 3
  PRE_COMMIT_: 3
  PYTEST_: 3
  HEARTBEAT_: 2
  QUALITY_GATE_: 3
forbidden_env_example_keys:
  - GEMINI_MODEL_PRIMARY
  - GEMINI_MODEL_FALLBACK
  - CONFIDENCE_THRESHOLD
  - YOUR_GEMINI_API_KEY
deprecated_removal_deadlines: {}
sections:
  required:
    - GEMINI_API_KEY
    - GEMINI_MODEL
  runtime_optional:
    - MOVI_WORKSPACE_ROOT
    - MOVI_INPUT_ROOT
    - MOVI_OUTPUT_ROOT
    - MOVI_MANIFEST_ROOT
    - MOVI_ARTIFACT_ROOT
    - MOVI_EVIDENCE_BUNDLE_PATH
    - MOVI_RUN_LIVE_TESTS
    - MOVI_LIVE_TEST_URL
    - MOVI_LIVE_COVERAGE_FILE
    - LIVE_COVERAGE_FILE
    - LIVE_HEARTBEAT_INTERVAL_SECONDS
    - LIVE_MAX_DURATION_SECONDS
    - LIVE_MAX_RETRIES
    - MOVI_ROLLBACK_HMAC_KEY
    - MOVI_ALLOW_HOST_EXECUTION
    - MOVI_ALLOW_EXTERNAL
    - MOVI_COMPOSE_FILE
    - MOVI_COMPOSE_SERVICE
    - MOVI_CI_IMAGE
    - MOVI_PREBUILT_VENV_DIR
    - MOVI_WEB_API_HOST
    - MOVI_WEB_API_PORT
    - MOVI_WEBUI_HOST
    - MOVI_WEBUI_PORT
    - MOVI_VENV_DIR
    - MOVI_ATOMIC_ALLOWLIST
    - MOVI_ATOMIC_MAX_FILES
    - MOVI_ATOMIC_MAX_LINES
    - MOVI_CLI_REPORT_BUDGET_MS
    - MOVI_PRE_PUSH_MODE
    - MOVI_REQUIRE_NON_EMPTY_RANGE
    - MOVI_ROLLBACK_RTO_BUDGET_MS
