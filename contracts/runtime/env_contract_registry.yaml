    - HEARTBEAT_INTERVAL_SECONDS
    - GEMINI_UI_AUDIT_MODEL
    - GEMINI_UI_AUDIT_TIMEOUT_MS
    - QUALITY_GATE_MAX_STEP_SECONDS
    - QUALITY_GATE_ALLOW_LIVE_NETWORK_TIMEOUT
    - PYTEST_HEARTBEAT_NAME
    - PYTEST_MAX_DURATION_SECONDS
  observability_context:
    - MOVI_TRACE_ID
    - MOVI_SESSION_ID
    - MOVI_REQUEST_ID
    - MOVI_USER_ID
    - MOVI_RUN_BUNDLE_ROOT
    - MOVI_RUN_DIR
    - MOVI_RUN_EVENTS_PATH
    - MOVI_RUN_STDERR_PATH
    - MOVI_RUN_SUMMARY_PATH
    - MOVI_RUN_EVIDENCE_INDEX_PATH
  ci_only:
    - MOVI_IN_CONTAINER
    - PRE_COMMIT_FROM_REF
    - PRE_COMMIT_TO_REF
  test_only:
    - MOVI_ENABLE_TEST_HOOKS
    - MOVI_APPLY_CRASH_AT
    - PYTEST_CURRENT_TEST
    - LIVE_TEST_PID
